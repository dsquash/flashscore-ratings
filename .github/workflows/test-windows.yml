name: Test Windows Install

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check INSTALL.bat for non-ASCII chars
        shell: powershell
        run: |
          $bytes = [System.IO.File]::ReadAllBytes("INSTALL.bat")
          $bad = $bytes | Where-Object { $_ -gt 127 }
          if ($bad.Count -gt 0) {
            Write-Error "INSTALL.bat contains $($bad.Count) non-ASCII byte(s)"
            exit 1
          }
          Write-Host "OK: INSTALL.bat is clean ASCII"

      - name: Install Python packages
        shell: cmd
        run: python -m pip install playwright httpx pillow gdown ttkbootstrap --quiet

      - name: Install Playwright Chromium
        shell: cmd
        run: python -m playwright install chromium

      - name: Syntax check Python files
        shell: cmd
        run: |
          python -m py_compile run.py && echo [OK] run.py
          python -m py_compile launcher.py && echo [OK] launcher.py
          python -m py_compile refresh_stats.py && echo [OK] refresh_stats.py
          python -m py_compile updater.py && echo [OK] updater.py

      - name: Test core imports
        shell: cmd
        run: python -c "import httpx, PIL, playwright, tkinter, ttkbootstrap, json, pathlib, subprocess, threading; print('[OK] all imports')"

      - name: Test Windows path and file I/O
        shell: cmd
        run: python -c "from pathlib import Path; import sys; o=Path('flashscore_output'); o.mkdir(exist_ok=True); f=o/'ci.txt'; f.write_text('ok',encoding='utf-8'); assert f.read_text(encoding='utf-8')=='ok'; f.unlink(); o.rmdir(); assert Path(sys.executable).exists(); print('[OK] path I/O OK')"

      - name: Test subprocess launch (simulates launcher starting script)
        shell: cmd
        run: python -c "import subprocess,sys; r=subprocess.run([sys.executable,'-c','print(42)'],capture_output=True,text=True,encoding='utf-8'); assert r.returncode==0 and '42' in r.stdout; print('[OK] subprocess OK')"

      - name: Test refresh_stats exits cleanly without URL
        shell: cmd
        continue-on-error: true
        run: python refresh_stats.py || echo [OK] exited as expected (no URL)

      - name: Check JSX files readable
        shell: powershell
        run: |
          $files = @("populate_lineup.jsx","reset_lineup.jsx","save_template_state.jsx","refresh_comps.jsx","Lineup Panel.jsx")
          foreach ($f in $files) {
            if (-not (Test-Path $f)) { Write-Host "SKIP: $f"; continue }
            $c = Get-Content $f -Raw -Encoding UTF8
            Write-Host "OK: $f ($($c.Length) chars)"
          }
