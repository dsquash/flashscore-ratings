name: Test Windows Install

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 1. INSTALL.bat has no non-ASCII characters ─────────────
      - name: Check INSTALL.bat for non-ASCII chars
        shell: powershell
        run: |
          $bytes = [System.IO.File]::ReadAllBytes("INSTALL.bat")
          $bad = $bytes | Where-Object { $_ -gt 127 }
          if ($bad.Count -gt 0) {
            Write-Error "INSTALL.bat contains $($bad.Count) non-ASCII byte(s) - will break on Windows CMD"
            exit 1
          }
          Write-Host "OK: INSTALL.bat is clean ASCII"

      # ── 2. Install packages ────────────────────────────────────
      - name: Install Python packages
        shell: cmd
        run: |
          python -m pip install playwright httpx pillow gdown ttkbootstrap --quiet
          if errorlevel 1 exit /b 1
          echo [OK] pip packages installed

      - name: Install Playwright Chromium
        shell: cmd
        run: |
          python -m playwright install chromium
          if errorlevel 1 exit /b 1
          echo [OK] Playwright Chromium installed

      # ── 3. Syntax check all Python files ──────────────────────
      - name: Syntax check Python files
        shell: cmd
        run: |
          python -m py_compile run.py
          if errorlevel 1 ( echo [FAIL] run.py & exit /b 1 )
          echo [OK] run.py

          python -m py_compile launcher.py
          if errorlevel 1 ( echo [FAIL] launcher.py & exit /b 1 )
          echo [OK] launcher.py

          python -m py_compile refresh_stats.py
          if errorlevel 1 ( echo [FAIL] refresh_stats.py & exit /b 1 )
          echo [OK] refresh_stats.py

          python -m py_compile updater.py
          if errorlevel 1 ( echo [FAIL] updater.py & exit /b 1 )
          echo [OK] updater.py

      # ── 4. Import tests ────────────────────────────────────────
      - name: Test imports (httpx, PIL, playwright)
        shell: cmd
        run: |
          python -c "import httpx, PIL, playwright; print('[OK] httpx, PIL, playwright')"
          if errorlevel 1 exit /b 1

      - name: Test launcher.py imports cleanly
        shell: cmd
        run: |
          python -c "
import sys
sys.path.insert(0, '.')
# Test all module-level imports in launcher.py work on Windows
import tkinter as tk
from tkinter import ttk, scrolledtext
import subprocess, threading, re, json
from pathlib import Path
try:
    import ttkbootstrap
    print('[OK] ttkbootstrap available')
except ImportError:
    print('[OK] ttkbootstrap not found - fallback to ttk')
print('[OK] launcher.py imports OK')
"
          if errorlevel 1 exit /b 1

      - name: Test run.py imports cleanly
        shell: cmd
        run: |
          python -c "
import sys
sys.path.insert(0, '.')
import httpx, json, asyncio
from pathlib import Path
import PIL
print('[OK] run.py core imports OK')
"
          if errorlevel 1 exit /b 1

      # ── 5. Windows path handling ───────────────────────────────
      - name: Test Windows path resolution
        shell: cmd
        run: |
          python -c "
from pathlib import Path
import sys

base = Path('.')
output = base / 'flashscore_output'
output.mkdir(exist_ok=True)
test_file = output / 'test.txt'
test_file.write_text('ok', encoding='utf-8')
assert test_file.read_text(encoding='utf-8') == 'ok'
test_file.unlink()
output.rmdir()

# Verify sys.executable points to python
assert Path(sys.executable).exists(), 'sys.executable not found'
print('[OK] Path handling OK')
print('[OK] sys.executable:', sys.executable)
"
          if errorlevel 1 exit /b 1

      # ── 6. Test subprocess launch (simulates launcher starting run.py) ──
      - name: Test subprocess launch
        shell: cmd
        run: |
          python -c "
import subprocess, sys
from pathlib import Path

result = subprocess.run(
    [sys.executable, '-c', 'print(\"subprocess OK\")'],
    stdout=subprocess.PIPE, stderr=subprocess.STDOUT,
    text=True, encoding='utf-8', errors='replace'
)
assert result.returncode == 0
assert 'subprocess OK' in result.stdout
print('[OK] subprocess launch works:', result.stdout.strip())
"
          if errorlevel 1 exit /b 1

      # ── 7. Test refresh_stats.py runs (no URL = exits cleanly) ─
      - name: Test refresh_stats.py exits cleanly without URL
        shell: cmd
        run: |
          python refresh_stats.py
          REM exit code 1 is expected (no URL) - just must not crash with exception
          echo [OK] refresh_stats.py exited (expected non-zero without URL)

      # ── 8. JSX files readable ─────────────────────────────────
      - name: Check JSX files are readable
        shell: powershell
        run: |
          $files = @("populate_lineup.jsx","reset_lineup.jsx","save_template_state.jsx","refresh_comps.jsx","Lineup Panel.jsx")
          foreach ($f in $files) {
            if (-not (Test-Path $f)) { Write-Host "SKIP: $f not found"; continue }
            $content = Get-Content $f -Raw -Encoding UTF8
            Write-Host "OK: $f ($($content.Length) chars)"
          }
          Write-Host "JSX check complete"
